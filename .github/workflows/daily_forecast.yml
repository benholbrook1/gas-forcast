name: Daily Gas Forecast SMS

on:
  schedule:
    # 22:00 UTC = 6:00 PM EST (UTC-5) / 7:00 PM EDT (UTC-4)
    # Adjust to 23:00 UTC during EDT (Mar–Nov) if you prefer strict 6 PM local time.
    - cron: "0 22 * * *"

  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:

jobs:
  send-forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run forecast script
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TARGET_PHONE_NUMBER: ${{ secrets.TARGET_PHONE_NUMBER }}
          TARGET_CITY:        ${{ secrets.TARGET_CITY }}   # e.g. toronto, ottawa, hamilton
        run: python forecast.py