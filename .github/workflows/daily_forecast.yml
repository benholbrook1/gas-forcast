name: Daily Gas Forecast SMS

on:
  schedule:
    # 21:00 UTC = 4:00 PM EST (winter) / 5:00 PM EDT (summer). Single fixed UTC time, no DST handling.
    - cron: "0 21 * * *"

  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:

jobs:
  send-forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Required: GEMINI_API_KEY, TWILIO_*, multiline RECIPIENTS ("phone, city" per line).
      # Optional: GEMINI_MODEL, GEMINI_MAX_RETRIES, GEMINI_RETRY_*_SECONDS, REGION, TIMEZONE,
      # SMS_TEMPLATE, SMS_MAX_LEN, SMS_MAX_LEN_DETAILED, DRY_RUN, DEBUG.
      - name: Run forecast script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          REGION: ${{ secrets.REGION }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          SMS_TEMPLATE: ${{ secrets.SMS_TEMPLATE }}
          SMS_MAX_LEN: ${{ secrets.SMS_MAX_LEN }}
          SMS_MAX_LEN_DETAILED: ${{ secrets.SMS_MAX_LEN_DETAILED }}
          LOG_DIR: logs
          DRY_RUN: ${{ secrets.DRY_RUN }}
        run: python forecast.py

      - name: Upload forecast logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forecast-logs-${{ github.run_id }}
          path: logs/
          if-no-files-found: warn
