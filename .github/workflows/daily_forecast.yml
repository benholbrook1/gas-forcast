name: Daily Gas Forecast SMS

on:
  schedule:
    # 22:00 UTC = 6:00 PM EST (UTC-5) / 7:00 PM EDT (UTC-4)
    # Adjust to 23:00 UTC during EDT (Mar–Nov) if you prefer strict 6 PM local time.
    - cron: "0 22 * * *"

  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:

jobs:
  send-forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Required repo secrets: GEMINI_API_KEY, TWILIO_*, TARGET_CITY (or TARGET_CITIES).
      # Optional: GEMINI_MODEL, REGION, TIMEZONE, SMS_TEMPLATE, SMS_MAX_LEN, DRY_RUN.
      - name: Run forecast script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER: ${{ secrets.TWILIO_TO_NUMBER }}
          TARGET_CITY: ${{ secrets.TARGET_CITY }}
          TARGET_CITIES: ${{ secrets.TARGET_CITIES }}
          REGION: ${{ secrets.REGION }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          SMS_TEMPLATE: ${{ secrets.SMS_TEMPLATE }}
          SMS_MAX_LEN: ${{ secrets.SMS_MAX_LEN }}
          LOG_DIR: logs
          DRY_RUN: ${{ secrets.DRY_RUN }}
        run: python forecast.py

      - name: Upload forecast logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forecast-logs-${{ github.run_id }}
          path: logs/
          if-no-files-found: warn
